config:
    default: true

    # Длина строк в технической документации не ограничивается.
    MD013: false

    # Разрешаем одинаковые заголовки в разных разделах документа.
    MD024:
        siblings_only: true

    # Разрешаем HTML, если позднее понадобятся details, summary или изображения.
    MD033: false

    # README может использовать имя проекта как первый заголовок.
    MD041: true

globs:
    - '**/*.md'

ignores:
    - 'vendor/**'
    - 'node_modules/**'
    - '.github/**'

